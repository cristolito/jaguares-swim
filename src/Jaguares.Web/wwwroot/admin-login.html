<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin — Jaguares Swim</title>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #071116;
            background-image: linear-gradient(rgba(7, 17, 22, 0.8), rgba(7, 17, 22, 0.8)), url('LOGO.PNG');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: clamp(250px, 40vw, 400px);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 20px;
        }
        .login-shell {
            width: 100%;
            max-width: 420px;
            background: rgba(11, 19, 30, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.4);
        }
        h1 {
            margin: 0 0 16px 0;
            color: #d4af37;
            font-size: 28px;
        }
        p {
            margin: 0 0 24px 0;
            color: #cbd5e1;
            line-height: 1.6;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: #d4af37;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            background: #d4af37;
            color: #071116;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #f3d376;
        }
        .message {
            margin-top: 16px;
            font-size: 14px;
            color: #cbd5e1;
        }
        .error {
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <h1>Acceso Admin</h1>
        <p>Ingresa la contraseña para acceder al panel administrativo de Jaguares Swim.</p>

        <label for="passwordInput">Contraseña</label>
        <input type="password" id="passwordInput" placeholder="Ingresar contraseña" autocomplete="off">
        <button type="button" onclick="iniciarSesion()">Ingresar</button>

        <p id="message" class="message"></p>
    </div>

    <script>
        async function checkIfAlreadyLoggedIn() {
            if (!JaguaresApi.getToken()) return;
            try {
                const response = await apiFetch('/api/Pagos');
                if (response.ok) {
                    window.location.href = '/admin.html';
                } else {
                    JaguaresApi.clearToken();
                }
            } catch (error) {
                console.warn('No autenticado todavía.');
            }
        }

        async function iniciarSesion() {
            const password = document.getElementById('passwordInput').value.trim();
            const message = document.getElementById('message');
            message.textContent = '';
            message.classList.remove('error');

            if (!password) {
                message.textContent = 'Ingresa la contraseña.';
                message.classList.add('error');
                return;
            }

            try {
                const response = await apiFetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    // Guardamos el token JWT de administrador.
                    if (data.token) JaguaresApi.setToken(data.token);
                    window.location.href = '/admin.html';
                    return;
                }

                message.textContent = data.message || 'Contraseña incorrecta.';
                message.classList.add('error');
            } catch (error) {
                message.textContent = 'Error al iniciar sesión. Intenta de nuevo.';
                message.classList.add('error');
                console.error(error);
            }
        }

        checkIfAlreadyLoggedIn();
    </script>
</body>
</html>
